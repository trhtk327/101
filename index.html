<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>חידון הארי פוטר</title>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{

font-family:Arial;
height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

background:url("https://i.postimg.cc/3xjMN2r8/8248b002f0904b3c3dcfbca4e8b1c183.jpg") center/cover no-repeat fixed;

color:white;

}

/* הקופסה המרכזית */

.container{

width:95%;
max-width:900px;

background:rgba(0,0,0,0.65);
backdrop-filter:blur(10px);

padding:35px;

border-radius:18px;

text-align:center;

box-shadow:0 0 40px rgba(0,0,0,0.9);

}

/* כפתור התחלה */

.start-btn{

font-size:32px;
padding:18px 70px;

background:#00ffcc;
color:black;

border:none;
border-radius:14px;

cursor:pointer;

font-weight:bold;

box-shadow:0 0 20px #00ffcc;

transition:0.3s;

}

.start-btn:hover{transform:scale(1.07)}

/* כפתורים קטנים */

.small-btn{

margin:10px;
padding:8px 18px;

border:none;
border-radius:7px;

background:#00c6ff;

cursor:pointer;

}

/* תשובות */

.answer{

background:rgba(255,255,255,0.1);

padding:14px;
margin:10px 0;

border-radius:10px;

cursor:pointer;

transition:0.25s;

text-align:right;

position:relative;

}

.answer:hover{background:rgba(255,255,255,0.25)}

.correct{background:#00ff88!important;color:black}

.wrong{background:#ff5252!important}

.mark{

position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
font-size:20px;

}

/* סרגל התקדמות */

.progress{

height:10px;
background:rgba(255,255,255,0.2);

border-radius:10px;

margin-bottom:20px;

}

.bar{

height:100%;
background:#00c6ff;

border-radius:10px;

}

/* סוף */

.result-box{

margin-top:20px;

background:linear-gradient(#1a1a1a,#000);

border-radius:20px;

padding:25px;

box-shadow:0 0 25px black;

}

.big-score{

font-size:45px;
font-weight:bold;
color:#00ffcc;

margin-bottom:10px;

}

.stats{

font-size:18px;
line-height:1.8;

margin-top:10px;

}

/* כפתורי סוף */

.end-btn{

padding:15px 30px;

font-size:18px;

border:none;
border-radius:12px;

margin:10px;

cursor:pointer;

}

.share-btn{background:#00e676;color:black}

.restart-btn{background:#ffca28;color:black}

.hidden{display:none}

input{

margin-top:20px;
padding:10px;

border:none;

border-radius:8px;

}

/* קרדיט */

.credit{

position:fixed;
bottom:10px;
width:100%;

text-align:center;

font-size:20px;
font-weight:bold;

color:white;

text-shadow:0 0 10px black;

}

</style>
</head>

<body>

<div class="container" id="box">

<div id="start">

<h1>חידון הארי פוטר וחדר הסודות</h1>

<br><br>

<button class="start-btn" onclick="startQuiz()">התחל חידון</button>

<br><br>

<button class="small-btn" onclick="toggleBackground()">החלף רקע</button>

<button class="small-btn" onclick="toggleTransparent()">רקע שקוף</button>

</div>

<div id="quiz" class="hidden">

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="qnum"></div>

<h2 id="q"></h2>

<div id="answers"></div>

<button class="small-btn" onclick="skip()">דלג על שאלה</button>

</div>

<div id="end" class="hidden">

<h1>סיום החידון</h1>

<div class="result-box">

<div id="score" class="big-score"></div>

<div id="msg"></div>

<div id="detail" class="stats"></div>

</div>

<input id="username" placeholder="הכנס את שמך">

<br>

<button class="end-btn share-btn" onclick="shareScore()">שתף עם חברים</button>

<button class="end-btn restart-btn" onclick="location.reload()">שחק שוב</button>

</div>

</div>

<div class="credit">
נוצר על ידי אריאל מאירי
</div>

<script>

let defaultBg="https://i.postimg.cc/3xjMN2r8/8248b002f0904b3c3dcfbca4e8b1c183.jpg"
let altBg="https://i.postimg.cc/hvMc3whD/7f5f2b7244fdd2f1eee8de341bcffbea.jpg"

let bg=false
let transparent=false

function toggleBackground(){

document.body.style.background=

bg?

`url(${defaultBg}) center/cover no-repeat fixed`

:

`url(${altBg}) center/cover no-repeat fixed`

bg=!bg

}

function toggleTransparent(){

let box=document.getElementById("box")

if(!transparent){

box.style.background="rgba(0,0,0,0)"
box.style.backdropFilter="none"

}else{

box.style.background="rgba(0,0,0,0.65)"
box.style.backdropFilter="blur(10px)"

}

transparent=!transparent

}

/* שאלות */

const questions=[

{q:"מי הופיע בחדרו של הארי בבית משפחת דרסלי והזהיר אותו שלא לחזור להוגוורטס?",a:["דובי","רון","הרמיוני","פיבס"],c:0},

{q:"איזה קינוח גרם דובי לרחף וליפול על האורחים בבית הדרסלים?",a:["עוגת שוקולד","פודינג פירות","עוגיות חמאה","פאי תפוחים"],c:1},

{q:"כיצד הארי ורון הגיעו להוגוורטס לאחר שלא הצליחו לעבור דרך המחסום?",a:["עפו עם המטאטאים שלהם","אבקת פלו","המכונית המעופפת של משפחת ויזלי","פורטל קסמים"],c:2},

{q:"באיזה עץ התנגשו כשהגיעו לשטח בית הספר?",a:["הערבה המפליקה","עץ אלון עתיק","עץ ערבה בכניסה להוגוורס","עץ ערמון ענק"],c:0},

{q:"מי היה היצור הראשון שנמצא מאובן?",a:["קולין קריווי","מיס נוריס","הרמיוני","ג'סטין"],c:1},

{q:"איזו כתובת הופיעה על הקיר ליד הקורבן הראשון?",a:["היורש חזר","חדר הסודות נפתח אויבי היורש היזהרו","הסוד נחשף","סלית'רין חי"],c:1},

{q:"באיזה אירוע גילה הארי שהוא מסוגל לדבר עם נחשים?",a:["שיעור קסמים","מועדון הדו קרב","שיעור תעופה","שיעור שינוי צורה"],c:1},

{q:"איזו חיה שחרר מאלפוי בדו קרב?",a:["נחש","עכביש","לטאה","חתול"],c:0},

{q:"היכן הכינו את שיקוי הפוליג'וס?",a:["כיתה ריקה","מרתף שיקויים","שירותי מירטל המייללת","חדר המועדון"],c:2},

{q:"למי היה השיער שהרמיוני לקחה בטעות לשיקוי?",a:["פנסי","חתולה","מיליסנט בולסטרוד","אחת הבנות מסלת'רין"],c:1},

{q:"לאיזה יצור הפכה הרמיוני?",a:["ינשוף","עכבר","חתול","נחש"],c:2},

{q:"איזה יצור פגשו ביער?",a:["ארגוג","טרול","דרקון","קנטאור"],c:0},

{q:"מי נחטפה לחדר הסודות?",a:["הרמיוני","ג'יני ויזלי","פנסי","גברת נוריס"],c:1},

{q:"איזה חפץ הראה להארי את זיכרונות טום רידל?",a:["טבעת","יומן","שרביט","קמע"],c:1},

{q:"איזו חיה הביאה את כובע המיון?",a:["הינשוף של הארי","עוף החול פוקס","דרקון","היפוגריף"],c:1},

{q:"איך הבזיליסק איבד את ראייתו?",a:["קללה","פוקס ניקר את עיניו"," הארי דקר אותו עם החרב גריפנדור","הכישוף של טום פגע בו בטעות"],c:1},

{q:"איך הארי השמיד את היומן?",a:["שרף אותו","דקר בניב הבזיליסק","חתך בחרב גריפנדור","הביא לדמבלדור להשמיד"],c:1},

{q:"איך דובי קיבל חופש?",a:["גרב בתוך ספר","כובע בתוך ספר","כפפה בתוך ספר","גרביים בתוך ספר"],c:0},

{q:"מי כתב את היומן?",a:["גריפנדור","טום רידל","מאלפוי","סלית'רין"],c:1},

{q:"איזה יצור היה בתוך חדר הסודות?",a:["דרקון","בזיליסק","טרול","עכביש"],c:1}

]

let i=0
let score=0
let wrong=0
let skipped=0

function startQuiz(){

document.getElementById("start").classList.add("hidden")
document.getElementById("quiz").classList.remove("hidden")

showQ()

}

function showQ(){

let q=questions[i]

document.getElementById("q").innerText=q.q

document.getElementById("qnum").innerText=`שאלה ${i+1} מתוך ${questions.length}`

document.getElementById("bar").style.width=(i/questions.length*100)+"%"

let ans=""

q.a.forEach((t,index)=>{

ans+=`<div class="answer" onclick="answer(${index})">${t}</div>`

})

document.getElementById("answers").innerHTML=ans

}

function answer(index){

let correct=questions[i].c

let all=document.querySelectorAll(".answer")

all.forEach((el,n)=>{

if(n==correct){

el.classList.add("correct")
el.innerHTML+=`<span class="mark">✔</span>`

}else el.classList.add("wrong")

})

if(index==correct)score+=5
else{

wrong++
all[index].innerHTML+=`<span class="mark">❌</span>`

}

setTimeout(next,1200)

}

function skip(){

skipped++
next()

}

function next(){

i++

if(i<questions.length)showQ()
else finish()

}

function finish(){

document.getElementById("quiz").classList.add("hidden")
document.getElementById("end").classList.remove("hidden")

document.getElementById("score").innerText=`🏆 ${score}/100`

document.getElementById("detail").innerText=
`✔ נכונות: ${score/5} | ❌ לא נכונות: ${wrong} | ⏭ דילג: ${skipped}`

let msg=""

if(score>=80)msg="🔥 מצטיין!"
else if(score>=50)msg="👍 יפה!"
else msg="💪 נסה שוב"

document.getElementById("msg").innerText=msg

}

function shareScore(){

let name=document.getElementById("username").value || "לא צוין"

let text=`
🧙‍♂️✨ חידון הארי פוטר ✨🧙‍♂️

📚 חדר הסודות

👤 שם:
${name}

🏆 הציון שלי:
${score}/100

📊 תוצאות

✔ נכונות: ${score/5}
❌ לא נכונות: ${wrong}
⏭ דילג: ${skipped}

⚡ חושבים שתנצחו אותי?

כנסו ונסו בעצמכם https://trhtk327.github.io/101/

נוצר על ידי אריאל מאירי
`

window.open(`https://wa.me/?text=${encodeURIComponent(text)}`)

}

</script>

</body>
</html>
